name: pysail-helper-app-5111

services:
  pysail-helper-app-5111:
    build: .
    container_name: pysail-helper-app-5111
    restart: unless-stopped
    ports:
      - "5111:5111"
    # Load every line from .env directly into container env with its
    # original case — Python side does case-insensitive lookup, so
    # CLOUDFLARE_API_TOKEN / cloudflare_api_token / OpenAI_key all work.
    env_file:
      - .env
    environment:
      # Fetch cadence (minutes). 60 = hourly.
      FETCH_INTERVAL_MIN: "60"
    volumes:
      - ./data:/data
