name: pysail-helper-app-5111

services:
  pysail-helper-app-5111:
    build: .
    container_name: pysail-helper-app-5111
    restart: unless-stopped
    ports:
      - "5111:5111"
    # Load every line from .env directly into container env with its
    # original case — Python side does case-insensitive lookup, so
    # CLOUDFLARE_API_TOKEN / cloudflare_api_token / OpenAI_key all work.
    env_file:
      - .env
    environment:
      FETCH_INTERVAL_MIN: "60"
    # NOTE: Ollama now runs as its OWN Coolify resource (Ollama + Open WebUI),
    # not as a service here. Reach it over Coolify's predefined network by
    # setting OLLAMA_URL in .env to the ollama container's network address,
    # e.g.  OLLAMA_URL=http://<ollama-container-name>:11434
    # (ai_provider.py reads OLLAMA_URL; see README for the exact value).
    volumes:
      - ./data:/data
