name: pysail-helper-app-5111

services:
  pysail-helper-app-5111:
    build: .
    container_name: pysail-helper-app-5111
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "5111:5111"
    # Load every line from .env directly into container env with its
    # original case — Python side does case-insensitive lookup, so
    # CLOUDFLARE_API_TOKEN / cloudflare_api_token / OpenAI_key all work.
    env_file:
      - .env
    environment:
      FETCH_INTERVAL_MIN: "60"
      # Internal DNS — both containers on the default compose network.
      OLLAMA_URL: "http://ollama:11434"
    volumes:
      - ./data:/data

  # Local CPU-only Ollama. Used by ai_provider when Settings → AI provider
  # is toggled to 'ollama'. Default model llama3.2:3b is ~2GB on disk and
  # ~3-4GB RSS during inference — well under the 16GB ceiling, leaves
  # plenty of headroom on a 64GB iMac that shares load with other apps.
  ollama:
    image: ollama/ollama:latest
    container_name: pysail-helper-app-5111-ollama
    restart: unless-stopped
    # No port published — only the helper-app container talks to it
    # over the internal compose network. Uncomment if you want to hit
    # http://localhost:11434 from the host for debugging.
    # ports:
    #   - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama   # persist downloaded models
    mem_limit: 16g          # hard ceiling — bursts allowed up to here
    memswap_limit: 16g      # no swap escape beyond the limit
    cpus: 8.0               # cap to 8 of the iMac's 20 threads
    environment:
      OLLAMA_KEEP_ALIVE: "5m"     # unload model 5 min after last use → idle ~50MB
      OLLAMA_NUM_PARALLEL: "1"    # CPU inference: serialize, don't thrash
