<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sailing-BC Helper</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f1f5f9; color: #0f172a; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #1e293b; color: #f8fafc; padding: 1rem;
               display: flex; flex-direction: column; gap: 0.25rem; }
    .sidebar h1 { font-size: 1rem; margin: 0 0 0.3rem; opacity: 0.7; letter-spacing: 0.1em; text-transform: uppercase; }
    .version-badge { display: inline-block; background: #3b82f6; color: #fff; font-size: 0.7rem;
                       padding: 2px 8px; border-radius: 999px; margin-bottom: 0.8rem; font-weight: 600; }
    .nav-section { font-size: 0.7rem; opacity: 0.5; margin: 0.8rem 0 0.3rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-btn { background: none; border: none; color: #cbd5e1; text-align: left;
               padding: 0.55rem 0.7rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .nav-btn:hover { background: #334155; color: #fff; }
    .nav-btn.active { background: #3b82f6; color: #fff; }
    .main { flex: 1; padding: 1.5rem 2rem; overflow-y: auto; }
    .main h2 { margin-top: 0; }
    .location-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .location-tabs button { padding: 0.4rem 0.8rem; border: 1px solid #cbd5e1; border-radius: 6px;
                             background: #fff; cursor: pointer; font-size: 0.85rem; }
    .location-tabs button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    th, td { padding: 0.55rem 0.8rem; text-align: left; font-size: 0.88rem; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-orange { background: #fed7aa; color: #9a3412; }
    .badge-red { background: #fecaca; color: #991b1b; }
    .card { background: #fff; border-radius: 8px; padding: 1.2rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 1rem; }
    .trend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .trend-cell { background: #f8fafc; padding: 1rem; border-radius: 6px; border: 1px solid #e2e8f0; }
    .trend-cell.best { background: #ecfdf5; border-color: #34d399; }
    .trend-cell h4 { margin: 0 0 0.5rem; text-transform: capitalize; }
    .trend-stat { font-size: 0.85rem; color: #475569; }
    .trend-stat strong { color: #0f172a; }
    .settings-form { max-width: 480px; }
    .settings-form label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem; }
    .settings-form input { width: 100%; padding: 0.55rem; border: 1px solid #cbd5e1; border-radius: 6px;
                            font-family: monospace; font-size: 0.85rem; }
    .settings-form button { margin-top: 0.8rem; padding: 0.55rem 1rem; background: #3b82f6; color: #fff;
                              border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #0f172a; color: #fff;
             padding: 0.7rem 1.2rem; border-radius: 6px; font-size: 0.85rem; }
    /* Top-of-page indeterminate progress bar — visible while any fetch is in-flight */
    .loadbar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: transparent;
               z-index: 9999; overflow: hidden; pointer-events: none; }
    .loadbar > div { position: absolute; height: 100%; width: 30%;
                      background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
                      animation: loadbar-slide 1.1s ease-in-out infinite; }
    @keyframes loadbar-slide {
      0%   { left: -30%; }
      100% { left: 100%; }
    }
    .muted { color: #64748b; font-size: 0.85rem; }
    .row-flex { display: flex; gap: 0.5rem; align-items: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Patch window.fetch to track in-flight count and fire a CustomEvent
    // every time it changes — used by <LoadBar> to show a top progress bar.
    (function patchFetch() {
      let inflight = 0;
      const orig = window.fetch.bind(window);
      const emit = () => window.dispatchEvent(new CustomEvent('fetch-inflight', { detail: inflight }));
      window.fetch = function (...args) {
        inflight++; emit();
        return orig(...args).finally(() => { inflight = Math.max(0, inflight - 1); emit(); });
      };
    })();

    function LoadBar() {
      const [n, setN] = useState(0);
      useEffect(() => {
        const h = (e) => setN(e.detail);
        window.addEventListener('fetch-inflight', h);
        return () => window.removeEventListener('fetch-inflight', h);
      }, []);
      if (!n) return null;
      return <div className="loadbar"><div /></div>;
    }

    // Catches render errors in any child so one bad view doesn't blank
    // the whole app. Shows the error inline + a reset button.
    class ErrorBoundary extends React.Component {
      constructor(p) { super(p); this.state = { err: null }; }
      static getDerivedStateFromError(err) { return { err }; }
      componentDidCatch(err, info) { console.error('ErrorBoundary caught:', err, info); }
      render() {
        if (this.state.err) {
          return (
            <div className="card" style={{ border: '1px solid #fecaca', background: '#fef2f2' }}>
              <h3 style={{ marginTop: 0, color: '#991b1b' }}>UI error</h3>
              <pre style={{ whiteSpace: 'pre-wrap', fontSize: '0.85rem' }}>{String(this.state.err)}</pre>
              <button onClick={() => this.setState({ err: null })}>Reset view</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function badgeForWind(kts) {
      if (kts == null) return null;
      if (kts < 10) return <span className="badge badge-green">{kts} kts</span>;
      if (kts < 20) return <span className="badge badge-orange">{kts} kts</span>;
      return <span className="badge badge-red">{kts} kts</span>;
    }

    function fmtTs(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-CA', { hour12: false, month: 'short', day: 'numeric',
                                          hour: '2-digit', minute: '2-digit' });
    }

    function App() {
      const [locations, setLocations] = useState([]);
      const [view, setView] = useState('log');     // log | graph | trends | settings
      const [activeLoc, setActiveLoc] = useState(null);
      const [toast, setToast] = useState(null);
      const [version, setVersion] = useState(null);

      useEffect(() => {
        fetch('/api/locations').then(r => r.json()).then(d => {
          setLocations(d);
          if (d.length) setActiveLoc(d[0].id);
        });
        fetch('/api/version').then(r => r.json()).then(d => setVersion(d.version));
      }, []);

      const triggerFetch = async () => {
        await fetch('/api/fetch_now', { method: 'POST' });
        setToast('Fetch cycle started');
        setTimeout(() => setToast(null), 2500);
      };

      return (
        <div className="app">
          <div className="sidebar">
            <h1>Sailing-BC Helper</h1>
            {version && <div className="version-badge">v{version}</div>}
            <div className="nav-section">Data</div>
            <button className={`nav-btn ${view === 'log' ? 'active' : ''}`} onClick={() => setView('log')}>Log</button>
            <button className={`nav-btn ${view === 'graph' ? 'active' : ''}`} onClick={() => setView('graph')}>Graph</button>
            <button className={`nav-btn ${view === 'trends' ? 'active' : ''}`} onClick={() => setView('trends')}>Trends</button>
            <button className={`nav-btn ${view === 'reconcile' ? 'active' : ''}`} onClick={() => setView('reconcile')}>Reconcile</button>
            <div className="nav-section">Admin</div>
            <button className="nav-btn" onClick={triggerFetch}>Fetch now</button>
            <button className={`nav-btn ${view === 'settings' ? 'active' : ''}`} onClick={() => setView('settings')}>Settings</button>
          </div>
          <div className="main">
            {view !== 'settings' && view !== 'trends' && view !== 'reconcile' && (
              <div className="location-tabs">
                {locations.map(l => (
                  <button key={l.id} className={activeLoc === l.id ? 'active' : ''}
                          onClick={() => setActiveLoc(l.id)}>{l.name}</button>
                ))}
              </div>
            )}
            <ErrorBoundary key={view + ':' + (activeLoc || '')}>
              {view === 'log' && activeLoc && <LogView locationId={activeLoc} />}
              {view === 'graph' && activeLoc && <GraphView locationId={activeLoc} />}
              {view === 'trends' && <TrendsView locations={locations} />}
              {view === 'reconcile' && <ReconcileView locations={locations} />}
              {view === 'settings' && <SettingsView />}
            </ErrorBoundary>
          </div>
          {toast && <div className="toast">{toast}</div>}
          <LoadBar />
        </div>
      );
    }

    function LogView({ locationId }) {
      const [rows, setRows] = useState(null);
      useEffect(() => {
        setRows(null);
        fetch(`/api/log?location=${locationId}&limit=12`).then(r => r.json()).then(setRows);
      }, [locationId]);
      if (rows === null) return <p className="muted">Loading…</p>;
      if (!Array.isArray(rows)) return <p style={{ color: '#dc2626' }}>API error: {JSON.stringify(rows)}</p>;
      if (!rows.length) return <p className="muted">No readings yet.</p>;
      return (
        <div className="card">
          <h2>Last 12 readings</h2>
          <table>
            <thead><tr><th>Time</th><th>Wind</th><th>Dir</th><th>Wave</th></tr></thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i}>
                  <td>{fmtTs(r.timestamp)}</td>
                  <td>{badgeForWind(r.wind_speed)}</td>
                  <td>{r.direction || '—'}</td>
                  <td>{r.wave_height_m != null ? `${Math.round(r.wave_height_m * 100)} cm` : '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function GraphView({ locationId }) {
      const [series, setSeries] = useState(null);
      const ref = useRef(null);
      useEffect(() => {
        setSeries(null);
        fetch(`/api/series?location=${locationId}&days=3`).then(r => r.json()).then(setSeries);
      }, [locationId]);
      useEffect(() => {
        if (!series || !ref.current) return;
        const x = series.map(s => s.timestamp);
        const traces = [
          { x, y: series.map(s => s.wind_speed), type: 'scatter', mode: 'lines+markers',
            name: 'Wind (kts)', line: { color: '#3b82f6' } },
        ];
        if (series.some(s => s.wave_height_m != null)) {
          traces.push({ x, y: series.map(s => s.wave_height_m != null ? s.wave_height_m * 100 : null),
                        type: 'scatter', mode: 'lines+markers', name: 'Wave (cm)',
                        yaxis: 'y2', line: { color: '#10b981' } });
        }
        Plotly.newPlot(ref.current, traces, {
          margin: { l: 50, r: 50, t: 30, b: 40 },
          // Fixed 0-35 kt range so all locations are visually comparable
          yaxis: { title: 'Wind (kts)', range: [0, 35], fixedrange: false },
          yaxis2: { title: 'Wave (cm)', overlaying: 'y', side: 'right' },
          legend: { orientation: 'h', y: -0.2 },
          height: 420,
        }, { responsive: true, displayModeBar: false });
      }, [series]);
      if (series === null) return <p className="muted">Loading…</p>;
      return (
        <div className="card">
          <h2>3-day series</h2>
          <div ref={ref} />
        </div>
      );
    }

    function TrendsView({ locations }) {
      const [data, setData] = useState(null);
      useEffect(() => {
        fetch('/api/trends?location=all&days=14').then(r => r.json()).then(setData);
      }, []);
      if (data === null) return <p className="muted">Loading 14-day trends…</p>;
      return (
        <div>
          <h2>14-day time-of-day trends</h2>
          <p className="muted">Average wind/wave for morning (8-12), afternoon (12-16), evening (16-20). Green tile = lowest average wind ("best" window).</p>
          {locations.map(loc => {
            const t = data[loc.id];
            if (!t) return null;
            return (
              <div className="card" key={loc.id}>
                <h3 style={{ marginTop: 0 }}>{loc.name}</h3>
                <div className="trend-grid">
                  {['morning', 'afternoon', 'evening'].map(w => {
                    const c = t[w] || {};
                    const isBest = t.best_window === w;
                    return (
                      <div key={w} className={`trend-cell ${isBest ? 'best' : ''}`}>
                        <h4>{w}{isBest && ' ★'}</h4>
                        <div className="trend-stat">Wind avg: <strong>{c.wind_avg_kts ?? '—'} kts</strong></div>
                        <div className="trend-stat">Wind max: <strong>{c.wind_max_kts ?? '—'} kts</strong></div>
                        {c.wave_avg_cm != null && <div className="trend-stat">Wave avg: <strong>{c.wave_avg_cm} cm</strong></div>}
                        {c.wave_max_cm != null && <div className="trend-stat">Wave max: <strong>{c.wave_max_cm} cm</strong></div>}
                        <div className="trend-stat muted">{c.samples} samples</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function ReconcileView({ locations }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [busy, setBusy] = useState({});  // {[bid_op]: true}
      const [toast, setToast] = useState(null);

      const load = async () => {
        setLoading(true);
        try {
          const r = await fetch('/api/reconcile');
          setData(await r.json());
        } finally { setLoading(false); }
      };
      useEffect(() => { load(); }, []);

      const sync = async (bid, dir) => {
        const k = `${bid}_${dir}`;
        setBusy(b => ({ ...b, [k]: true }));
        try {
          const url = dir === 'kv_to_db' ? '/api/reconcile/sync_kv_to_db' : '/api/reconcile/sync_db_to_kv';
          const r = await fetch(url, { method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ location: bid }) });
          const j = await r.json();
          setToast(`${bid}: ${dir === 'kv_to_db' ? 'pulled ' + j.synced + ' from KV' : 'pushed ' + j.pushed + ' to KV'}`);
          setTimeout(() => setToast(null), 3000);
          load();
        } finally {
          setBusy(b => { const c = { ...b }; delete c[k]; return c; });
        }
      };

      return (
        <div>
          <h2>Reconcile</h2>
          <p className="muted">Compares local SQLite store with Cloudflare KV. Useful to verify the
            helper-app's writes actually landed in KV (where the main Streamlit app reads from).
            <br /><strong>Sync KV → DB</strong> backfills your local SQLite from KV.
            &nbsp;<strong>Sync DB → KV</strong> pushes any locally-stored rows that never made it to KV.</p>
          <button onClick={load} disabled={loading} style={{ marginBottom: 12 }}>
            {loading ? 'Comparing…' : 'Refresh'}
          </button>
          {!data && <p className="muted">Loading…</p>}
          {data && locations.map(loc => {
            const r = data[loc.id];
            if (!r) return null;
            if (!r.ok) return (
              <div className="card" key={loc.id} style={{ borderLeft: '4px solid #dc2626' }}>
                <h3 style={{ marginTop: 0 }}>{loc.name}</h3>
                <p style={{ color: '#dc2626' }}>Error: {r.error}</p>
              </div>
            );
            const k = `${loc.id}_kv_to_db`;
            const k2 = `${loc.id}_db_to_kv`;
            return (
              <div className="card" key={loc.id}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <h3 style={{ margin: 0 }}>{loc.name} <span className="muted" style={{ fontSize: '0.85rem' }}>({loc.id})</span></h3>
                  <span className="muted" style={{ fontSize: '0.85rem' }}>matched: <strong>{r.matched}</strong></span>
                </div>
                <div className="trend-grid" style={{ marginTop: 12 }}>
                  <div className="trend-cell">
                    <h4>SQLite</h4>
                    <div className="trend-stat"><strong>{r.db_count}</strong> rows</div>
                  </div>
                  <div className="trend-cell">
                    <h4>Cloudflare KV</h4>
                    <div className="trend-stat"><strong>{r.kv_count}</strong> keys</div>
                  </div>
                  <div className="trend-cell" style={{
                      background: r.missing_in_kv_total > 0 ? '#fef2f2' : '#f8fafc',
                      borderColor: r.missing_in_kv_total > 0 ? '#fca5a5' : '#e2e8f0' }}>
                    <h4>Missing in KV</h4>
                    <div className="trend-stat"><strong>{r.missing_in_kv_total}</strong></div>
                    {r.missing_in_kv_total > 0 &&
                      <button style={{ marginTop: 6, fontSize: '0.78rem', padding: '4px 8px' }}
                              disabled={busy[k2]} onClick={() => sync(loc.id, 'db_to_kv')}>
                        {busy[k2] ? 'Pushing…' : 'Push to KV →'}
                      </button>}
                  </div>
                </div>
                <div style={{ marginTop: 10 }}>
                  <div className="trend-cell" style={{
                      background: r.missing_in_db_total > 0 ? '#fffbeb' : '#f8fafc',
                      borderColor: r.missing_in_db_total > 0 ? '#fbbf24' : '#e2e8f0' }}>
                    <h4>Missing in SQLite</h4>
                    <div className="trend-stat"><strong>{r.missing_in_db_total}</strong> keys exist only in KV (likely from main Streamlit app)</div>
                    {r.missing_in_db_total > 0 &&
                      <button style={{ marginTop: 6, fontSize: '0.78rem', padding: '4px 8px' }}
                              disabled={busy[k]} onClick={() => sync(loc.id, 'kv_to_db')}>
                        {busy[k] ? 'Pulling…' : '← Pull from KV into SQLite'}
                      </button>}
                  </div>
                </div>
                {r.missing_in_kv.length > 0 && (
                  <details style={{ marginTop: 10 }}>
                    <summary className="muted" style={{ cursor: 'pointer' }}>Sample missing-in-KV timestamps</summary>
                    <pre style={{ fontSize: '0.75rem', background: '#f8fafc', padding: 8, borderRadius: 4 }}>
                      {r.missing_in_kv.slice(0, 20).join('\n')}
                    </pre>
                  </details>
                )}
              </div>
            );
          })}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    function SettingsView() {
      const [info, setInfo] = useState(null);
      const [val, setVal] = useState('');
      const [saved, setSaved] = useState(false);
      const [test, setTest] = useState(null);
      const [testing, setTesting] = useState(false);
      const load = () => fetch('/api/settings').then(r => r.json()).then(setInfo);
      useEffect(load, []);
      const save = async () => {
        await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                         body: JSON.stringify({ openai_api_key: val }) });
        setSaved(true);
        setVal('');
        load();
        setTimeout(() => setSaved(false), 2000);
      };
      const runTest = async () => {
        setTesting(true);
        setTest(null);
        try {
          const r = await fetch('/api/settings/test', { method: 'POST' });
          setTest(await r.json());
        } catch (e) {
          setTest({ error: String(e) });
        }
        setTesting(false);
      };
      const row = (label, res) => (
        <div className="trend-stat" style={{ marginBottom: 6 }}>
          <span style={{ display: 'inline-block', width: 100, fontWeight: 600 }}>{label}</span>
          {res
            ? <>
                <span className={`badge ${res.ok ? 'badge-green' : 'badge-red'}`}>{res.ok ? 'OK' : 'FAIL'}</span>
                <span style={{ marginLeft: 8 }}>{res.detail}</span>
              </>
            : <span className="muted">—</span>}
        </div>
      );
      return (
        <div className="card settings-form">
          <h2>Settings</h2>
          <label>OpenAI API key</label>
          {info && (
            <p className="muted">
              {info.openai_api_key_set
                ? <>Currently set: <code>{info.openai_api_key_masked}</code></>
                : 'Not set.'}
            </p>
          )}
          <input type="password" placeholder="sk-…" value={val} onChange={e => setVal(e.target.value)} />
          <div className="row-flex" style={{ marginTop: 8 }}>
            <button onClick={save} disabled={!val}>Save</button>
            <button onClick={() => fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                                                              body: JSON.stringify({ openai_api_key: '' }) }).then(load)}
                    style={{ background: '#64748b' }}>Clear</button>
            {saved && <span style={{ color: '#10b981' }}>Saved ✓</span>}
          </div>
          <hr style={{ margin: '1.5rem 0', border: 0, borderTop: '1px solid #e2e8f0' }} />
          <h3 style={{ marginTop: 0 }}>Test credentials</h3>
          <p className="muted">Live-checks that .env keys actually work against Cloudflare and OpenAI.</p>
          <button onClick={runTest} disabled={testing}>{testing ? 'Testing…' : 'Run test'}</button>
          {test && !test.error && (
            <div style={{ marginTop: 12 }}>
              {row('Cloudflare', test.cloudflare)}
              {row('OpenAI', test.openai)}
            </div>
          )}
          {test && test.error && <p style={{ color: '#dc2626' }}>{test.error}</p>}

          <hr style={{ margin: '1.5rem 0', border: 0, borderTop: '1px solid #e2e8f0' }} />
          <UsageBlock />
        </div>
      );
    }

    function UsageBlock() {
      const [u, setU] = useState(null);
      const load = () => fetch('/api/usage').then(r => r.json()).then(setU);
      useEffect(load, []);

      // Stacked bar: solid segment = actual usage so far, lighter segment =
      // projected additional usage by end-of-window. Red overlay if the
      // projection exceeds the limit.
      const bar = (used, projected, limit, color) => {
        const usedPct = Math.min(100, (used / Math.max(1, limit)) * 100);
        const projPct = Math.min(100, (projected / Math.max(1, limit)) * 100);
        const overshoot = projected > limit;
        return (
          <div style={{ background: '#e2e8f0', borderRadius: 4, height: 12, overflow: 'hidden',
                          marginTop: 4, position: 'relative' }}>
            {/* projected (lighter) layer underneath */}
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${projPct}%`,
                            background: overshoot ? '#fca5a5' : color, opacity: 0.45 }} />
            {/* actual (solid) layer on top */}
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${usedPct}%`,
                            background: overshoot ? '#dc2626' : color }} />
          </div>
        );
      };

      const block = (label, k) => (
        <div style={{ marginBottom: 14 }}>
          <div className="trend-stat">
            <strong>{label}</strong>: {k.today_used.toLocaleString()} so far •
            projected <strong>{k.today_projected.toLocaleString()}</strong> /
            {k.today_limit.toLocaleString()} today
            {k.today_will_exceed && <span className="badge badge-red" style={{ marginLeft: 6 }}>WILL EXCEED</span>}
          </div>
          {bar(k.today_used, k.today_projected, k.today_limit, '#3b82f6')}
          <div className="trend-stat muted" style={{ marginTop: 4, fontSize: '0.78rem' }}>
            Month: {k.month_used.toLocaleString()} → projected {k.month_projected.toLocaleString()} /
            {k.month_limit.toLocaleString()}
            {k.month_will_exceed && <span className="badge badge-red" style={{ marginLeft: 6 }}>WILL EXCEED</span>}
          </div>
          {bar(k.month_used, k.month_projected, k.month_limit, '#8b5cf6')}
        </div>
      );

      if (!u) return <p className="muted">Loading usage…</p>;
      return (
        <div>
          <h3 style={{ marginTop: 0 }}>API rate limits (Cloudflare KV free tier)</h3>
          <p className="muted" style={{ marginBottom: 12 }}>
            Today {u.today_date} ({u.hours_into_day}h in) — Month {u.month} (day {u.days_into_month.toFixed(1)} of {u.days_in_month}).
            <br />
            <span style={{ display: 'inline-block', width: 10, height: 10, background: '#3b82f6', borderRadius: 2, marginRight: 4 }} />
            actual so far &nbsp;
            <span style={{ display: 'inline-block', width: 10, height: 10, background: '#3b82f6', opacity: 0.45, borderRadius: 2, marginRight: 4 }} />
            projected by end of window
          </p>
          {block('Reads',  u.reads)}
          {block('Writes', u.writes)}
          {block('Lists',  u.lists)}
          <p className="muted" style={{ marginTop: 12, fontSize: '0.78rem' }}>
            <strong>Free-tier daily limits</strong>: {u.limits_daily.reads_per_day.toLocaleString()} reads,
            {' '}{u.limits_daily.writes_per_day.toLocaleString()} writes, {u.limits_daily.lists_per_day.toLocaleString()} lists.
            Monthly comparison uses daily×{u.days_in_month} as implied ceiling (CF doesn't publish a separate monthly cap).
          </p>
          <p className="muted" style={{ fontSize: '0.78rem' }}>{u.note}</p>
          <button onClick={load} style={{ background: '#64748b', marginTop: 4 }}>Refresh</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
