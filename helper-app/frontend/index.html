<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sailing-BC Helper</title>
  <!-- Versions PINNED on purpose: the unpinned @babel/standalone auto-upgraded
       on the CDN and a newer release started treating these inline text/babel
       scripts as ES modules, throwing "Cannot use import statement outside a
       module" and blanking the page. Pinning freezes known-good behavior. -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f1f5f9; color: #0f172a; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: #1e293b; color: #f8fafc; padding: 1rem;
               display: flex; flex-direction: column; gap: 0.25rem; }
    .sidebar h1 { font-size: 1rem; margin: 0 0 0.3rem; opacity: 0.7; letter-spacing: 0.1em; text-transform: uppercase; }
    .version-badge { display: inline-block; background: #3b82f6; color: #fff; font-size: 0.7rem;
                       padding: 2px 8px; border-radius: 999px; margin-bottom: 0.8rem; font-weight: 600; }
    .nav-section { font-size: 0.7rem; opacity: 0.5; margin: 0.8rem 0 0.3rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-btn { background: none; border: none; color: #cbd5e1; text-align: left;
               padding: 0.55rem 0.7rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .nav-btn:hover { background: #334155; color: #fff; }
    .nav-btn.active { background: #3b82f6; color: #fff; }
    .main { flex: 1; padding: 1.5rem 2rem; overflow-y: auto; }
    .main h2 { margin-top: 0; }
    .location-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .location-tabs button { padding: 0.4rem 0.8rem; border: 1px solid #cbd5e1; border-radius: 6px;
                             background: #fff; cursor: pointer; font-size: 0.85rem; }
    .location-tabs button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    th, td { padding: 0.55rem 0.8rem; text-align: left; font-size: 0.88rem; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-orange { background: #fed7aa; color: #9a3412; }
    .badge-red { background: #fecaca; color: #991b1b; }
    .card { background: #fff; border-radius: 8px; padding: 1.2rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 1rem; }
    .trend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .trend-cell { background: #f8fafc; padding: 1rem; border-radius: 6px; border: 1px solid #e2e8f0; }
    .trend-cell.best { background: #ecfdf5; border-color: #34d399; }
    .trend-cell h4 { margin: 0 0 0.5rem; text-transform: capitalize; }
    .trend-stat { font-size: 0.85rem; color: #475569; }
    .trend-stat strong { color: #0f172a; }
    .settings-form { max-width: none; }
    /* Constrain the key-input + key-info bits — full width is overkill for an sk-… string */
    .settings-form > input[type="password"] { max-width: 560px; }
    .settings-form label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem; }
    .settings-form input { width: 100%; padding: 0.55rem; border: 1px solid #cbd5e1; border-radius: 6px;
                            font-family: monospace; font-size: 0.85rem; }
    .settings-form button { margin-top: 0.8rem; padding: 0.55rem 1rem; background: #3b82f6; color: #fff;
                              border: none; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #0f172a; color: #fff;
             padding: 0.7rem 1.2rem; border-radius: 6px; font-size: 0.85rem; }
    /* Top-of-page indeterminate progress bar — visible while any fetch is in-flight */
    .loadbar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: transparent;
               z-index: 9999; overflow: hidden; pointer-events: none; }
    .loadbar > div { position: absolute; height: 100%; width: 30%;
                      background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
                      animation: loadbar-slide 1.1s ease-in-out infinite; }
    @keyframes loadbar-slide {
      0%   { left: -30%; }
      100% { left: 100%; }
    }
    .muted { color: #64748b; font-size: 0.85rem; }
    .row-flex { display: flex; gap: 0.5rem; align-items: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Patch window.fetch to track in-flight count and fire a CustomEvent
    // every time it changes — used by <LoadBar> to show a top progress bar.
    (function patchFetch() {
      let inflight = 0;
      const orig = window.fetch.bind(window);
      const emit = () => window.dispatchEvent(new CustomEvent('fetch-inflight', { detail: inflight }));
      window.fetch = function (...args) {
        inflight++; emit();
        return orig(...args).finally(() => { inflight = Math.max(0, inflight - 1); emit(); });
      };
    })();

    function LoadBar() {
      const [n, setN] = useState(0);
      useEffect(() => {
        const h = (e) => setN(e.detail);
        window.addEventListener('fetch-inflight', h);
        return () => window.removeEventListener('fetch-inflight', h);
      }, []);
      if (!n) return null;
      return <div className="loadbar"><div /></div>;
    }

    // Catches render errors in any child so one bad view doesn't blank
    // the whole app. Shows the error inline + a reset button.
    class ErrorBoundary extends React.Component {
      constructor(p) { super(p); this.state = { err: null }; }
      static getDerivedStateFromError(err) { return { err }; }
      componentDidCatch(err, info) { console.error('ErrorBoundary caught:', err, info); }
      render() {
        if (this.state.err) {
          return (
            <div className="card" style={{ border: '1px solid #fecaca', background: '#fef2f2' }}>
              <h3 style={{ marginTop: 0, color: '#991b1b' }}>UI error</h3>
              <pre style={{ whiteSpace: 'pre-wrap', fontSize: '0.85rem' }}>{String(this.state.err)}</pre>
              <button onClick={() => this.setState({ err: null })}>Reset view</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function badgeForWind(kts) {
      if (kts == null) return null;
      if (kts < 10) return <span className="badge badge-green">{kts} kts</span>;
      if (kts < 20) return <span className="badge badge-orange">{kts} kts</span>;
      return <span className="badge badge-red">{kts} kts</span>;
    }

    function fmtTs(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-CA', { hour12: false, month: 'short', day: 'numeric',
                                          hour: '2-digit', minute: '2-digit' });
    }

    function App() {
      const [locations, setLocations] = useState([]);
      const [view, setView] = useState('graph');   // graph | log | trends | reconcile | settings
      const [activeLoc, setActiveLoc] = useState(null);
      const [toast, setToast] = useState(null);
      const [version, setVersion] = useState(null);

      useEffect(() => {
        fetch('/api/locations').then(r => r.json()).then(d => {
          setLocations(d);
          if (d.length) setActiveLoc(d[0].id);
        });
        fetch('/api/version').then(r => r.json()).then(d => setVersion(d.version));
      }, []);

      const triggerFetch = async () => {
        await fetch('/api/fetch_now', { method: 'POST' });
        setToast('Fetch cycle started');
        setTimeout(() => setToast(null), 2500);
      };

      return (
        <div className="app">
          <div className="sidebar">
            <h1>Sailing-BC Helper</h1>
            {version && <div className="version-badge">v{version}</div>}
            <div className="nav-section">Data</div>
            <button className={`nav-btn ${view === 'graph' ? 'active' : ''}`} onClick={() => setView('graph')}>Graph</button>
            <button className={`nav-btn ${view === 'log' ? 'active' : ''}`} onClick={() => setView('log')}>Log</button>
            <button className={`nav-btn ${view === 'trends' ? 'active' : ''}`} onClick={() => setView('trends')}>Trends</button>
            <button className={`nav-btn ${view === 'annualtides' ? 'active' : ''}`} onClick={() => setView('annualtides')}>Annual Tides</button>
            <button className={`nav-btn ${view === 'forecast' ? 'active' : ''}`} onClick={() => setView('forecast')}>Marine Forecast</button>
            <button className={`nav-btn ${view === 'wave' ? 'active' : ''}`} onClick={() => setView('wave')}>Wave Model</button>
            <button className={`nav-btn ${view === 'alexa' ? 'active' : ''}`} onClick={() => setView('alexa')}>Alexa</button>
            <button className={`nav-btn ${view === 'api' ? 'active' : ''}`} onClick={() => setView('api')}>API</button>
            <button className={`nav-btn ${view === 'reconcile' ? 'active' : ''}`} onClick={() => setView('reconcile')}>Reconcile</button>
            <div className="nav-section">Admin</div>
            <button className="nav-btn" onClick={triggerFetch}>Fetch now</button>
            <button className={`nav-btn ${view === 'settings' ? 'active' : ''}`} onClick={() => setView('settings')}>Settings</button>
          </div>
          <div className="main">
            {view !== 'settings' && view !== 'trends' && view !== 'reconcile' && view !== 'wave' && view !== 'alexa' && view !== 'forecast' && view !== 'api' && view !== 'annualtides' && (
              <div className="location-tabs">
                {locations.map(l => (
                  <button key={l.id} className={activeLoc === l.id ? 'active' : ''}
                          onClick={() => setActiveLoc(l.id)}>{l.name}</button>
                ))}
              </div>
            )}
            <ErrorBoundary key={view + ':' + (activeLoc || '')}>
              {view === 'log' && activeLoc && <LogView locationId={activeLoc} />}
              {view === 'graph' && activeLoc && <GraphView locationId={activeLoc} />}
              {view === 'trends' && <TrendsView locations={locations} />}
              {view === 'annualtides' && <AnnualTidesView />}
              {view === 'forecast' && <ForecastView />}
              {view === 'wave' && <WaveModelView />}
              {view === 'alexa' && <AlexaView />}
              {view === 'api' && <APIView locations={locations} />}
              {view === 'reconcile' && <ReconcileView locations={locations} />}
              {view === 'settings' && <SettingsView />}
            </ErrorBoundary>
          </div>
          {toast && <div className="toast">{toast}</div>}
          <LoadBar />
        </div>
      );
    }

    function LogView({ locationId }) {
      const [rows, setRows] = useState(null);
      useEffect(() => {
        setRows(null);
        fetch(`/api/log?location=${locationId}&limit=12`).then(r => r.json()).then(setRows);
      }, [locationId]);
      if (rows === null) return <p className="muted">Loading…</p>;
      if (!Array.isArray(rows)) return <p style={{ color: '#dc2626' }}>API error: {JSON.stringify(rows)}</p>;
      if (!rows.length) return <p className="muted">No readings yet.</p>;
      return (
        <div className="card">
          <h2>Last 12 readings</h2>
          <table>
            <thead><tr><th>Time</th><th>Wind</th><th>Dir</th><th>Wave</th></tr></thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i}>
                  <td>{fmtTs(r.timestamp)}</td>
                  <td>{badgeForWind(r.wind_speed)}</td>
                  <td>{r.direction || '—'}</td>
                  <td>{r.wave_height_m != null ? `${Math.round(r.wave_height_m * 100)} cm` : '—'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ── Day/night shading (dependency-free NOAA sun calc, DST-correct) ──
    const _DAY_FILL = 'rgba(135, 206, 250, 0.28)';   // light sky blue — clearly visible
    const _NIGHT_FILL = 'rgba(28, 52, 94, 0.33)';    // darker navy
    const _VAN_TZ = 'America/Vancouver';
    const _VANFMT = new Intl.DateTimeFormat('en-CA', {
      timeZone: _VAN_TZ, year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

    function _mod(a, n) { return ((a % n) + n) % n; }
    function _dayOfYear(y, m, d) { return Math.floor((Date.UTC(y, m - 1, d) - Date.UTC(y, 0, 1)) / 86400000) + 1; }

    function _sunUT(year, month, day, isSunrise, lat, lon) {
      const toRad = Math.PI / 180;
      const N = _dayOfYear(year, month, day);
      const lngHour = lon / 15;
      const t = N + ((isSunrise ? 6 : 18) - lngHour) / 24;
      const M = 0.9856 * t - 3.289;
      const L = _mod(M + 1.916 * Math.sin(M * toRad) + 0.020 * Math.sin(2 * M * toRad) + 282.634, 360);
      let RA = _mod(Math.atan(0.91764 * Math.tan(L * toRad)) / toRad, 360);
      RA += (Math.floor(L / 90) * 90) - (Math.floor(RA / 90) * 90);
      RA /= 15;
      const sinDec = 0.39782 * Math.sin(L * toRad);
      const cosDec = Math.cos(Math.asin(sinDec));
      const cosH = (Math.cos(90.833 * toRad) - sinDec * Math.sin(lat * toRad)) / (cosDec * Math.cos(lat * toRad));
      if (cosH > 1 || cosH < -1) return null;
      let H = isSunrise ? (360 - Math.acos(cosH) / toRad) : (Math.acos(cosH) / toRad);
      H /= 15;
      const T = H + RA - 0.06571 * t - 6.622;
      return _mod(T - lngHour, 24);
    }

    function _vanWall(instant) {
      const m = {}; _VANFMT.formatToParts(instant).forEach(p => m[p.type] = p.value);
      const hh = m.hour === '24' ? '00' : m.hour;
      return { date: `${m.year}-${m.month}-${m.day}`, iso: `${m.year}-${m.month}-${m.day}T${hh}:${m.minute}:${m.second}` };
    }

    function _sunWall(year, month, day, isSunrise, lat, lon) {
      const ut = _sunUT(year, month, day, isSunrise, lat, lon);
      if (ut == null) return null;
      let instant = new Date(Date.UTC(year, month - 1, day) + ut * 3600000);
      let w = _vanWall(instant);
      const target = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      if (w.date !== target) {  // snap the event back onto local date (UTC drift fix)
        const drift = Math.round((Date.parse(target + 'T00:00:00Z') - Date.parse(w.date + 'T00:00:00Z')) / 86400000);
        instant = new Date(instant.getTime() + drift * 86400000);
        w = _vanWall(instant);
      }
      return w.iso;
    }

    // naiveTimestamps: sorted ascending "YYYY-MM-DDTHH:MM:SS" (Vancouver wall clock)
    function buildDayNightShapes(naiveTimestamps, lat = 49.28, lon = -123.12) {
      if (!naiveTimestamps.length) return [];
      const start = naiveTimestamps[0];
      const end = naiveTimestamps[naiveTimestamps.length - 1];
      const startDate = new Date(start.slice(0, 10) + 'T00:00:00Z');
      const endDate = new Date(end.slice(0, 10) + 'T00:00:00Z');
      const clamp = (s) => s < start ? start : (s > end ? end : s);

      // Daylight intervals per day (±1 day slack), clipped to the window
      const dayIntervals = [];
      for (let t = startDate.getTime() - 86400000; t <= endDate.getTime() + 86400000; t += 86400000) {
        const dt = new Date(t);
        const y = dt.getUTCFullYear(), mo = dt.getUTCMonth() + 1, da = dt.getUTCDate();
        const sr = _sunWall(y, mo, da, true, lat, lon);
        const ss = _sunWall(y, mo, da, false, lat, lon);
        if (!sr || !ss || sr >= ss) continue;
        const a = clamp(sr), b = clamp(ss);
        if (a < b) dayIntervals.push([a, b]);
      }
      dayIntervals.sort((p, q) => p[0] < q[0] ? -1 : 1);

      // Night = complement of daylight within [start, end]
      const nightIntervals = [];
      let cursor = start;
      for (const [a, b] of dayIntervals) {
        if (cursor < a) nightIntervals.push([cursor, a]);
        if (b > cursor) cursor = b;
      }
      if (cursor < end) nightIntervals.push([cursor, end]);

      const rect = (x0, x1, color) => ({
        type: 'rect', xref: 'x', yref: 'paper', x0, x1, y0: 0, y1: 1,
        fillcolor: color, line: { width: 0 }, layer: 'below',
      });
      return [
        ...dayIntervals.map(([a, b]) => rect(a, b, _DAY_FILL)),
        ...nightIntervals.map(([a, b]) => rect(a, b, _NIGHT_FILL)),
      ];
    }

    function GraphView({ locationId }) {
      const [series, setSeries] = useState(null);
      const [days, setDays] = useState(3);   // default 3-day series; 7 / 30 offered
      const [initing, setIniting] = useState(false);
      const [initMsg, setInitMsg] = useState(null);
      const ref = useRef(null);
      const reload = () => {
        setSeries(null);
        fetch(`/api/series?location=${locationId}&days=${days}`).then(r => r.json()).then(setSeries);
      };
      useEffect(reload, [locationId, days]);

      const rangeButtons = (
        <div className="row-flex" style={{ marginBottom: 10 }}>
          {[3, 7, 30].map(d => (
            <button key={d} onClick={() => setDays(d)}
                    style={{ background: days === d ? '#1d4ed8' : '#64748b',
                              fontWeight: days === d ? 700 : 400 }}>
              {d} days{days === d ? ' ✓' : ''}
            </button>
          ))}
        </div>
      );

      const runInit = async () => {
        if (!confirm('Bootstrap SQLite from Cloudflare KV for ALL buoys? Reads all historical keys — can take a minute on cold deploy.')) return;
        setIniting(true);
        setInitMsg(null);
        try {
          const r = await fetch('/api/reconcile/sync_all', { method: 'POST' });
          const j = await r.json();
          const pulled = Object.values(j.pulled || {}).reduce((a, v) => a + (typeof v === 'number' ? v : 0), 0);
          setInitMsg(`Pulled ${pulled} readings from KV. Reloading…`);
          setTimeout(reload, 800);
        } catch (e) {
          setInitMsg(`Error: ${e}`);
        }
        setIniting(false);
      };

      useEffect(() => {
        if (!series || !ref.current) return;
        if (!Array.isArray(series) || series.length === 0) return;
        // Strip the tz offset → naive Vancouver wall clock, so data and the
        // day/night shading share one consistent time frame for Plotly.
        const x = series.map(s => String(s.timestamp).slice(0, 19));
        const traces = [
          { x, y: series.map(s => s.wind_speed), type: 'scatter', mode: 'lines+markers',
            name: 'Wind (kts)', line: { color: '#3b82f6' } },
        ];
        if (series.some(s => s.wave_height_m != null)) {
          traces.push({ x, y: series.map(s => s.wave_height_m != null ? s.wave_height_m * 100 : null),
                        type: 'scatter', mode: 'lines+markers', name: 'Wave (cm)',
                        yaxis: 'y2', line: { color: '#10b981' } });
        }
        // Day/Night legend proxies (shapes don't appear in the legend on their own)
        traces.push({ x: [null], y: [null], type: 'scatter', mode: 'markers', name: 'Day',
                      marker: { size: 12, symbol: 'square', color: 'rgba(135,206,250,0.85)' } });
        traces.push({ x: [null], y: [null], type: 'scatter', mode: 'markers', name: 'Night',
                      marker: { size: 12, symbol: 'square', color: 'rgba(28,52,94,0.85)' } });

        let shapes = [];
        try { shapes = buildDayNightShapes(x); } catch (e) { console.warn('shading skipped', e); }

        Plotly.newPlot(ref.current, traces, {
          margin: { l: 50, r: 50, t: 30, b: 40 },
          // Fixed 0-35 kt range so all locations are visually comparable
          yaxis: { title: 'Wind (kts)', range: [0, 35], fixedrange: false },
          yaxis2: { title: 'Wave (cm)', overlaying: 'y', side: 'right' },
          legend: { orientation: 'h', y: -0.2 },
          height: 420,
          shapes,
        }, { responsive: true, displayModeBar: false });
      }, [series]);
      if (series === null) {
        return <div className="card">{rangeButtons}<p className="muted">Loading…</p></div>;
      }
      if (!Array.isArray(series) || series.length === 0) {
        return (
          <div className="card">
            {rangeButtons}
            <div style={{ textAlign: 'center', padding: '2rem 1rem' }}>
              <h2 style={{ marginTop: 0 }}>No data for the last {days} days</h2>
              <p className="muted">
                SQLite has no readings for this location in this window. Bootstrap it by
                pulling every existing key from Cloudflare KV (runs for all buoys), or try a
                wider range above.
              </p>
              <button onClick={runInit} disabled={initing} style={{ background: '#10b981', fontSize: '1rem', padding: '0.7rem 1.5rem' }}>
                {initing ? 'Initializing…' : '⚡ INIT — pull all data from KV'}
              </button>
              {initMsg && <p style={{ marginTop: 12 }}>{initMsg}</p>}
            </div>
          </div>
        );
      }
      // Average wind by 4-hour period of day, over the loaded window.
      // Hour is read straight from the Vancouver wall-clock string
      // ("…T13:00:00") so there's no timezone drift.
      const PERIODS = [
        ['12am – 4am', 0], ['4am – 8am', 4], ['8am – 12pm', 8],
        ['12pm – 4pm', 12], ['4pm – 8pm', 16], ['8pm – 12am', 20],
      ];
      const buckets = PERIODS.map(([label, start]) => ({ label, start, sum: 0, n: 0, max: 0 }));
      for (const s of series) {
        if (s.wind_speed == null) continue;
        const hh = parseInt(String(s.timestamp).slice(11, 13), 10);
        if (isNaN(hh)) continue;
        const b = buckets[Math.floor(hh / 4)];
        if (!b) continue;
        b.sum += s.wind_speed; b.n += 1; b.max = Math.max(b.max, s.wind_speed);
      }
      const windColor = (v) => v == null ? '#475569' : (v >= 15 ? '#dc2626' : (v >= 10 ? '#b45309' : '#16a34a'));
      const calmest = buckets.filter(b => b.n).reduce((m, b) => (m == null || b.sum / b.n < m.sum / m.n) ? b : m, null);

      return (
        <div className="card">
          {rangeButtons}
          <h2 style={{ marginTop: 0 }}>{days}-day series</h2>
          <div ref={ref} />

          <h3 style={{ marginTop: 18, marginBottom: 6 }}>Average wind by time of day ({days}-day)</h3>
          <table className="log-table">

    function AnnualTidesView() {
      const [data, setData] = useState(null);
      const [err, setErr] = useState(null);
      const ref = useRef(null);
      useEffect(() => {
        fetch('/api/annual_tides').then(r => r.json()).then(setData).catch(e => setErr(String(e)));
      }, []);

      useEffect(() => {
        if (!data || !data.days || !data.days.length || !ref.current) return;
        const x = data.days.map(d => d.date);
        const highs = data.days.map(d => d.high);
        const lows = data.days.map(d => d.low);
        const traces = [
          { x, y: lows, type: 'scatter', mode: 'lines', name: 'Daily low tide',
            line: { color: '#0ea5e9', width: 1.5 } },
          { x, y: highs, type: 'scatter', mode: 'lines', name: 'Daily high tide',
            line: { color: '#1d4ed8', width: 1.5 }, fill: 'tonexty',
            fillcolor: 'rgba(59,130,246,0.10)' },
        ];

        // Moon-phase overlay: faint vertical line at each event + emoji at top.
        const EMOJI = { new: '🌑', first_quarter: '🌓', full: '🌕', last_quarter: '🌗' };
        const shapes = [];
        const annotations = [];
        (data.moons || []).forEach(m => {
          const spring = m.spring;
          shapes.push({
            type: 'line', xref: 'x', yref: 'paper', x0: m.date, x1: m.date, y0: 0, y1: 1,
            line: { color: spring ? 'rgba(30,41,59,0.28)' : 'rgba(148,163,184,0.22)',
                    width: 1, dash: spring ? 'solid' : 'dot' },
            layer: 'below',
          });
          // Only label new & full (spring) to avoid clutter
          if (spring) {
            annotations.push({
              x: m.date, y: 1.02, xref: 'x', yref: 'paper', text: EMOJI[m.phase] || '',
              showarrow: false, font: { size: 13 },
            });
          }
        });
        // 'Today' marker
        if (data.now) {
          shapes.push({ type: 'line', xref: 'x', yref: 'paper', x0: data.now, x1: data.now,
                        y0: 0, y1: 1, line: { color: '#dc2626', width: 2 } });
          annotations.push({ x: data.now, y: -0.08, xref: 'x', yref: 'paper', text: 'today',
                             showarrow: false, font: { size: 11, color: '#dc2626' } });
        }

        Plotly.newPlot(ref.current, traces, {
          margin: { l: 50, r: 20, t: 30, b: 40 },
          yaxis: { title: 'Height (m, chart datum)' },
          xaxis: { title: '' },
          legend: { orientation: 'h', y: -0.18 },
          height: 460,
          shapes, annotations,
        }, { responsive: true, displayModeBar: false });
      }, [data]);

      if (err) return <div className="card"><p style={{ color: '#dc2626' }}>{err}</p></div>;
      if (!data) return <div className="card"><p className="muted">Loading a year of tide predictions…</p></div>;
      if (data.error || !data.days || !data.days.length) {
        return <div className="card"><p style={{ color: '#dc2626' }}>{data.error || 'No tide data.'}</p></div>;
      }

      // Extremes summary
      const days = data.days;
      const maxHigh = days.reduce((m, d) => d.high > m.high ? d : m, days[0]);
      const minLow = days.reduce((m, d) => d.low < m.low ? d : m, days[0]);

      return (
        <div>
          <h2>Annual Tides — {data.station}</h2>
          <p className="muted">Daily high/low envelope, ±6 months. The band widens at
            <strong> spring tides</strong> (🌑 new & 🌕 full moon — highest highs, lowest lows) and
            narrows at <strong>neap tides</strong> (quarter moons). Faint vertical lines mark moon phases.</p>

          <div className="trend-grid" style={{ marginBottom: 12 }}>
            <div className="trend-cell">
              <h4>Highest tide</h4>
              <div className="trend-stat"><strong>{maxHigh.high} m</strong></div>
              <div className="muted" style={{ fontSize: '0.78rem' }}>{maxHigh.date}</div>
            </div>
            <div className="trend-cell">
              <h4>Lowest tide</h4>
              <div className="trend-stat"><strong>{minLow.low} m</strong></div>
              <div className="muted" style={{ fontSize: '0.78rem' }}>{minLow.date}</div>
            </div>
            <div className="trend-cell">
              <h4>Range</h4>
              <div className="trend-stat"><strong>{(maxHigh.high - minLow.low).toFixed(2)} m</strong></div>
              <div className="muted" style={{ fontSize: '0.78rem' }}>max − min over the year</div>
            </div>
          </div>

          <div className="card"><div ref={ref} /></div>
          <p className="muted" style={{ fontSize: '0.78rem', marginTop: 6 }}>
            Source: DFO IWLS predictions (Point Atkinson). 🌑 new · 🌕 full = spring tides.
            Best low-tide beach/launch windows cluster around new & full moons.
          </p>
        </div>
      );
    }

    function WaveModelView() {
      const [data, setData] = useState(null);
      const [wind, setWind] = useState(15);
      const [dir, setDir] = useState('');
      const BANDS = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      const load = () => fetch('/api/wave_model').then(r => r.json()).then(setData);
      useEffect(load, []);

      const predict = (m) => {
        const band = dir;
        const bb = band && m.by_direction && m.by_direction[band] && m.by_direction[band].fitted
          ? m.by_direction[band] : null;
        const slope = bb ? bb.slope_m_per_kt2 : m.best.slope_m_per_kt2;
        const inter = bb ? bb.intercept_m   : m.best.intercept_m;
        const r2    = bb ? bb.r2            : m.best.r2;
        const cm = Math.max(0, (slope * wind * wind + inter) * 100);
        return { cm, r2, source: bb ? `direction-specific (${band})` : 'global fit' };
      };

      if (!data) return <p className="muted">Fitting…</p>;
      return (
        <div>
          <h2>Wave height model</h2>
          <p className="muted">Empirically fits <code>wave_m ≈ a · wind_kts² + b</code> against your stored
            buoy data, sweeping lags 0–12h to find the wind→wave delay. Physics ref: fully-developed open-ocean
            seas give slope ≈ 0.00566 m/kt² (SMB / Pierson-Moskowitz). Lower slope here = fetch-limited basin.</p>
          {Object.entries(data).map(([bid, m]) => (
            <div key={bid} className="card">
              <h3 style={{ marginTop: 0 }}>{m.name} <span className="muted" style={{ fontSize: '0.85rem' }}>({bid})</span></h3>
              {m.error ? (
                <p style={{ color: '#dc2626' }}>{m.error}</p>
              ) : (
                <>
                  <p style={{ fontSize: '1.1rem', fontWeight: 600,
                                background: '#f0fdf4', border: '1px solid #86efac',
                                padding: '0.6rem 0.9rem', borderRadius: 6, fontFamily: 'ui-monospace, monospace' }}>
                    {m.formula}
                  </p>
                  <div className="trend-grid">
                    <div className="trend-cell">
                      <h4>Best lag</h4>
                      <div className="trend-stat"><strong>{m.best.lag_hours}h</strong></div>
                      <div className="muted" style={{ fontSize: '0.78rem' }}>(wind→wave delay)</div>
                    </div>
                    <div className="trend-cell">
                      <h4>R²</h4>
                      <div className="trend-stat"><strong>{m.best.r2.toFixed(3)}</strong></div>
                      <div className="muted" style={{ fontSize: '0.78rem' }}>fit quality</div>
                    </div>
                    <div className="trend-cell">
                      <h4>Fetch effect</h4>
                      <div className="trend-stat"><strong>{m.fetch_limit_pct_of_open_ocean}%</strong></div>
                      <div className="muted" style={{ fontSize: '0.78rem' }}>of open-ocean SMB slope</div>
                    </div>
                  </div>
                  <p className="muted" style={{ marginTop: 10, fontSize: '0.85rem' }}>
                    Fit on {m.best.n_pairs} hourly pairs from {m.n_hourly_rows} bucketed readings.
                  </p>
                  <div style={{ marginTop: 10, padding: 10, background: '#f8fafc', borderRadius: 6 }}>
                    <strong style={{ marginRight: 8 }}>Predict for wind =</strong>
                    <input type="number" min="0" max="50" value={wind}
                           onChange={e => setWind(parseFloat(e.target.value) || 0)}
                           style={{ width: 70, padding: 4 }} /> kts
                    &nbsp;from&nbsp;
                    <select value={dir} onChange={e => setDir(e.target.value)} style={{ padding: 4 }}>
                      <option value="">(any / global)</option>
                      {BANDS.map(b => <option key={b} value={b}>{b}</option>)}
                    </select>
                    {' → '}
                    {(() => {
                      const p = predict(m);
                      return (
                        <>
                          <strong style={{ color: '#1d4ed8' }}>{(p.cm/100).toFixed(2)} m ({p.cm.toFixed(0)} cm)</strong>
                          <span className="muted" style={{ marginLeft: 8, fontSize: '0.8rem' }}>
                            via {p.source}, R²={p.r2.toFixed(2)}
                          </span>
                        </>
                      );
                    })()}
                  </div>
                  <details style={{ marginTop: 8 }}>
                    <summary className="muted" style={{ cursor: 'pointer', fontSize: '0.85rem' }}>
                      By wind direction (lag {m.best.lag_hours}h)
                      {m.weighted_r2_across_directions != null && (
                        <span style={{ marginLeft: 8 }}>— weighted R² = <strong>{m.weighted_r2_across_directions.toFixed(2)}</strong></span>
                      )}
                    </summary>
                    <table className="log-table" style={{ marginTop: 6 }}>
                      <thead><tr><th>dir</th><th>n</th><th>slope</th><th>intercept</th><th>R²</th><th>fetch fx</th></tr></thead>
                      <tbody>
                        {BANDS.map(b => {
                          const bb = m.by_direction[b] || { n_pairs: 0, fitted: false };
                          if (!bb.fitted) return (
                            <tr key={b}><td>{b}</td><td>{bb.n_pairs}</td>
                              <td colSpan="4" className="muted">— not enough data —</td></tr>
                          );
                          const fetchPct = (bb.slope_m_per_kt2 / 0.00566 * 100).toFixed(0);
                          return (
                            <tr key={b}>
                              <td><strong>{b}</strong></td>
                              <td>{bb.n_pairs}</td>
                              <td>{bb.slope_m_per_kt2.toFixed(5)}</td>
                              <td>{bb.intercept_m.toFixed(3)}</td>
                              <td>{bb.r2.toFixed(3)}</td>
                              <td>{fetchPct}%</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </details>
                  <details style={{ marginTop: 8 }}>
                    <summary className="muted" style={{ cursor: 'pointer', fontSize: '0.85rem' }}>R² by lag</summary>
                    <table className="log-table" style={{ marginTop: 6 }}>
                      <thead><tr><th>lag (h)</th><th>n</th><th>slope</th><th>intercept</th><th>R²</th></tr></thead>
                      <tbody>
                        {m.all_lags.map(l => (
                          <tr key={l.lag_hours} style={l.lag_hours === m.best.lag_hours ? { background: '#dcfce7', fontWeight: 600 } : {}}>
                            <td>{l.lag_hours}</td><td>{l.n_pairs}</td>
                            <td>{l.slope_m_per_kt2.toFixed(5)}</td>
                            <td>{l.intercept_m.toFixed(3)}</td>
                            <td>{l.r2.toFixed(3)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </details>
                </>
              )}
            </div>
          ))}
          <button onClick={load}>Refit</button>
        </div>
      );
    }

    function ReconcileView({ locations }) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [busy, setBusy] = useState({});  // {[bid_op]: true}
      const [toast, setToast] = useState(null);

      const load = async () => {
        setLoading(true);
        try {
          const r = await fetch('/api/reconcile');
          setData(await r.json());
        } finally { setLoading(false); }
      };
      useEffect(() => { load(); }, []);

      const sync = async (bid, dir) => {
        const k = `${bid}_${dir}`;
        setBusy(b => ({ ...b, [k]: true }));
        try {
          const url = dir === 'kv_to_db' ? '/api/reconcile/sync_kv_to_db' : '/api/reconcile/sync_db_to_kv';
          const r = await fetch(url, { method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ location: bid }) });
          const j = await r.json();
          setToast(`${bid}: ${dir === 'kv_to_db' ? 'pulled ' + j.synced + ' from KV' : 'pushed ' + j.pushed + ' to KV'}`);
          setTimeout(() => setToast(null), 3000);
          load();
        } finally {
          setBusy(b => { const c = { ...b }; delete c[k]; return c; });
        }
      };

      return (
        <div>
          <h2>Reconcile</h2>
          <p className="muted">Compares local SQLite store with Cloudflare KV. Useful to verify the
            helper-app's writes actually landed in KV (where the main Streamlit app reads from).
            <br /><strong>Sync KV → DB</strong> backfills your local SQLite from KV.
            &nbsp;<strong>Sync DB → KV</strong> pushes any locally-stored rows that never made it to KV.</p>
          <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap' }}>
            <button onClick={load} disabled={loading}>
              {loading ? 'Comparing…' : 'Refresh'}
            </button>
            <button onClick={async () => {
              if (!confirm('Sync all buoys both directions? Pulls KV→DB then pushes DB→KV for each location. Can take a minute.')) return;
              setBusy(b => ({ ...b, _all: true }));
              try {
                const r = await fetch('/api/reconcile/sync_all', { method: 'POST' });
                const j = await r.json();
                const pulled = Object.values(j.pulled || {}).reduce((a, v) => a + (typeof v === 'number' ? v : 0), 0);
                const pushed = Object.values(j.pushed || {}).reduce((a, v) => a + (typeof v === 'number' ? v : 0), 0);
                setToast(`Synced all: pulled ${pulled} from KV, pushed ${pushed} to KV`);
                setTimeout(() => setToast(null), 4000);
                load();
              } finally {
                setBusy(b => { const c = { ...b }; delete c._all; return c; });
              }
            }} disabled={busy._all} style={{ background: '#10b981' }}>
              {busy._all ? 'Syncing all…' : '⇅ Sync all (both directions)'}
            </button>
          </div>
          {!data && <p className="muted">Loading…</p>}
          {data && locations.map(loc => {
            const r = data[loc.id];
            if (!r) return null;
            if (!r.ok) return (
              <div className="card" key={loc.id} style={{ borderLeft: '4px solid #dc2626' }}>
                <h3 style={{ marginTop: 0 }}>{loc.name}</h3>
                <p style={{ color: '#dc2626' }}>Error: {r.error}</p>
              </div>
            );
            const k = `${loc.id}_kv_to_db`;
            const k2 = `${loc.id}_db_to_kv`;
            return (
              <div className="card" key={loc.id}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <h3 style={{ margin: 0 }}>{loc.name} <span className="muted" style={{ fontSize: '0.85rem' }}>({loc.id})</span></h3>
                  <span className="muted" style={{ fontSize: '0.85rem' }}>matched: <strong>{r.matched}</strong></span>
                </div>
                <div className="trend-grid" style={{ marginTop: 12 }}>
                  <div className="trend-cell">
                    <h4>SQLite</h4>
                    <div className="trend-stat"><strong>{r.db_count}</strong> rows</div>
                  </div>
                  <div className="trend-cell">
                    <h4>Cloudflare KV</h4>
                    <div className="trend-stat"><strong>{r.kv_count}</strong> keys</div>
                  </div>
                  <div className="trend-cell" style={{
                      background: r.missing_in_kv_total > 0 ? '#fef2f2' : '#f8fafc',
                      borderColor: r.missing_in_kv_total > 0 ? '#fca5a5' : '#e2e8f0' }}>
                    <h4>Missing in KV</h4>
                    <div className="trend-stat"><strong>{r.missing_in_kv_total}</strong></div>
                    {r.missing_in_kv_total > 0 &&
                      <button style={{ marginTop: 6, fontSize: '0.78rem', padding: '4px 8px' }}
                              disabled={busy[k2]} onClick={() => sync(loc.id, 'db_to_kv')}>
                        {busy[k2] ? 'Pushing…' : 'Push to KV →'}
                      </button>}
                  </div>
                </div>
                <div style={{ marginTop: 10 }}>
                  <div className="trend-cell" style={{
                      background: r.missing_in_db_total > 0 ? '#fffbeb' : '#f8fafc',
                      borderColor: r.missing_in_db_total > 0 ? '#fbbf24' : '#e2e8f0' }}>
                    <h4>Missing in SQLite</h4>
                    <div className="trend-stat"><strong>{r.missing_in_db_total}</strong> keys exist only in KV (likely from main Streamlit app)</div>
                    {r.missing_in_db_total > 0 &&
                      <button style={{ marginTop: 6, fontSize: '0.78rem', padding: '4px 8px' }}
                              disabled={busy[k]} onClick={() => sync(loc.id, 'kv_to_db')}>
                        {busy[k] ? 'Pulling…' : '← Pull from KV into SQLite'}
                      </button>}
                  </div>
                </div>
                {r.missing_in_kv.length > 0 && (
                  <details style={{ marginTop: 10 }}>
                    <summary className="muted" style={{ cursor: 'pointer' }}>Sample missing-in-KV timestamps</summary>
                    <pre style={{ fontSize: '0.75rem', background: '#f8fafc', padding: 8, borderRadius: 4 }}>
                      {r.missing_in_kv.slice(0, 20).join('\n')}
                    </pre>
                  </details>
                )}
              </div>
            );
          })}
          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    function HealthCheckBlock() {
      const [data, setData] = useState(null);
      const [running, setRunning] = useState(false);
      const run = async () => {
        setRunning(true); setData(null);
        try {
          const r = await fetch('/api/healthcheck', { method: 'POST' });
          setData(await r.json());
        } catch (e) {
          setData({ error: String(e) });
        }
        setRunning(false);
      };
      const ICON = { pass: '✅', warn: '⚠️', fail: '❌', skip: '⏭️', info: 'ℹ️' };
      const COLOR = { pass: '#16a34a', warn: '#b45309', fail: '#dc2626', skip: '#64748b', info: '#475569' };
      return (
        <div>
          <h3 style={{ marginTop: 0 }}>🩺 Health check</h3>
          <p className="muted">Validates Cloudflare, OpenAI, Ollama (server/model/generation),
            rate limits, local data, forecast cache, and the Alexa briefing in one shot.</p>
          <button onClick={run} disabled={running} style={{ background: '#0ea5e9' }}>
            {running ? 'Running checks…' : 'Run health check'}
          </button>
          {running && <p className="muted" style={{ marginTop: 6 }}>
            (If Ollama is the active provider, this runs a real CPU inference — can take ~1-2 min.)
          </p>}

          {data && data.error && <p style={{ color: '#dc2626' }}>{data.error}</p>}
          {data && !data.error && (
            <div style={{ marginTop: 12 }}>
              <div style={{ marginBottom: 8 }}>
                {['pass', 'warn', 'fail', 'skip', 'info'].filter(k => data.summary[k]).map(k => (
                  <span key={k} style={{ marginRight: 12, fontWeight: 600, color: COLOR[k] }}>
                    {ICON[k]} {data.summary[k]} {k}
                  </span>
                ))}
                <span className="muted" style={{ fontSize: '0.8rem' }}>
                  · {new Date(data.ran_at).toLocaleTimeString()}
                </span>
              </div>
              <table className="log-table">
                <thead><tr><th></th><th>Check</th><th>Detail</th></tr></thead>
                <tbody>
                  {data.checks.map((c, i) => (
                    <tr key={i}>
                      <td style={{ fontSize: '1.1rem' }}>{ICON[c.status] || '•'}</td>
                      <td style={{ fontWeight: 600, color: COLOR[c.status], whiteSpace: 'nowrap' }}>{c.name}</td>
                      <td style={{ fontSize: '0.85rem' }}>{c.detail}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

            <div className="muted" style={{ fontSize: '0.78rem', marginTop: 4 }}>
              For text parsing use a <strong>text</strong> model like <code>qwen2.5:3b</code> —
              avoid <code>vl</code>/<code>-vision</code> tags (slower, vision-only).
            </div>

            {/* Pull a NEW model not yet installed */}
            <h4 style={{ margin: '12px 0 4px' }}>Pull a model</h4>
            <div className="row-flex">
              <input type="text" style={{ flex: 1, minWidth: 200 }}
                     placeholder="qwen2.5:3b"
                     value={pullName}
                     onChange={e => setPullName(e.target.value)} />
              <button onClick={pull} disabled={pulling}>
                {pulling ? 'Pulling…' : '⬇ Pull'}
              </button>
              {msg && <span style={{ marginLeft: 8 }}>{msg}</span>}
            </div>
            <p className="muted" style={{ fontSize: '0.78rem', marginTop: 6 }}>
              First pull downloads the model (~2 GB for a 3B). CPU inference is slow — expect
              ~10-90s per forecast parse on a 10-core iMac depending on model size. Falls back
              to OpenAI when the toggle is on OpenAI.
            </p>
          </div>

          <div style={{ marginTop: 12 }}>
            <button onClick={runForecastTest} disabled={testing}
                    style={{ background: '#7c3aed' }}>
              {testing ? 'Running…' : '🧪 Test model with forecast (Howe Sound)'}
            </button>
            <p className="muted" style={{ fontSize: '0.78rem', marginTop: 4 }}>
              Forces a fresh fetch + AI parse using the provider/model selected above (bypasses
              the hourly cache). Shows raw output + parsed rows + tokens/time/cost.
            </p>
          </div>

          {testResult && <ForecastTestModal result={testResult} onClose={() => setTestResult(null)} />}
        </div>
      );
    }


    function ForecastTestModal({ result, onClose }) {
      const money = (v) => v == null ? '—' : '$' + Number(v).toFixed(v < 1 ? 6 : 2);
      const overlay = {
        position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.55)',
        zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: '2rem',
      };
      const sheet = {
        background: '#fff', borderRadius: 10, maxWidth: 1080, width: '100%',
        maxHeight: '90vh', overflowY: 'auto', padding: '1.5rem',
        boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
      };
      return (
        <div style={overlay} onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div style={sheet}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h2 style={{ margin: 0 }}>🧪 Forecast test — {result.name || 'Howe Sound'}</h2>
              <button onClick={onClose} style={{ background: '#64748b' }}>Close</button>
            </div>

            {result.status === 'running' && (
              <p className="muted" style={{ marginTop: 16 }}>Fetching forecast HTML and running the AI parse… (Ollama on CPU can take 30-90s)</p>
            )}

            {result.status === 'error' && (
              <div style={{ marginTop: 16, color: '#dc2626' }}>
                <strong>Error:</strong> {result.error}
              </div>
            )}

            {result.status === 'ok' && (
              <>
                <div className="trend-grid" style={{ marginTop: 16 }}>
                  <div className="trend-cell">
                    <h4>Provider / Model</h4>
                    <div className="trend-stat">
                      {result.provider === 'ollama' ? '🖥 ' : '☁️ '}
                      <strong>{result.provider}</strong>
                      <br /><code style={{ fontSize: '0.85rem' }}>{result.model}</code>
                    </div>
                  </div>
                  <div className="trend-cell">
                    <h4>Tokens (in / out)</h4>
                    <div className="trend-stat">
                      <strong>{result.prompt_tokens?.toLocaleString()}</strong>
                      &nbsp;/&nbsp;
                      <strong>{result.completion_tokens?.toLocaleString()}</strong>
                    </div>
                  </div>
                  <div className="trend-cell">
                    <h4>Time / Cost</h4>
                    <div className="trend-stat">
                      <strong>{result.elapsed_sec?.toFixed(2)}s</strong>
                      &nbsp;·&nbsp;
                      <strong>{money(result.cost_usd)}</strong>
                    </div>
                  </div>
                </div>

                {result.issued && (
                  <p className="muted" style={{ marginTop: 12, fontSize: '0.85rem' }}>
                    Forecast issued {new Date(result.issued).toLocaleString()} · {result.period}
                  </p>
                )}

                <h3 style={{ marginTop: 16 }}>Parsed rows ({result.rows?.length || 0})</h3>
                {result.rows && result.rows.length > 0 ? (
                  <table className="log-table">
                    <thead><tr><th>Period</th><th>Wind</th><th>Gust</th><th>Direction</th></tr></thead>
                    <tbody>
                      {result.rows.map((r, i) => (
                        <tr key={i}
                            style={Math.max(r.wind, r.gust) > 15 ? { background: '#fee2e2' }
                                : (Math.max(r.wind, r.gust) > 10 ? { background: '#fef9c3' } : {})}>
                          <td>{r.time}</td><td>{r.wind} kt</td><td>{r.gust} kt</td><td>{r.dir}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                ) : (
                  <p className="muted">No rows parsed. Inspect the raw output below to see what the model returned.</p>
                )}

                <details style={{ marginTop: 16 }}>
                  <summary className="muted" style={{ cursor: 'pointer' }}>Raw model output</summary>
                  <pre style={{ background: '#0f172a', color: '#e2e8f0', padding: 12,
                                  borderRadius: 6, overflowX: 'auto', fontSize: '0.82rem',
                                  whiteSpace: 'pre-wrap' }}>
                    {result.raw_output || '(empty)'}
                  </pre>
                </details>

                {result.clean_input && (
                  <details style={{ marginTop: 8 }} open>
                    <summary className="muted" style={{ cursor: 'pointer' }}>Cleaned input actually sent to the model</summary>
                    <p style={{ lineHeight: 1.5, marginTop: 6, background: '#f0fdf4',
                                  border: '1px solid #86efac', borderRadius: 6, padding: 10 }}>
                      {result.clean_input}
                    </p>
                  </details>
                )}
                {result.forecast_text && result.forecast_text !== result.clean_input && (
                  <details style={{ marginTop: 8 }}>
                    <summary className="muted" style={{ cursor: 'pointer' }}>Source forecast summary (reference)</summary>
                    <p style={{ lineHeight: 1.5, marginTop: 6 }}>{result.forecast_text}</p>
                  </details>
                )}
              </>
            )}
          </div>
        </div>
      );
    }


    function AILogBlock() {
      const [d, setD] = useState(null);
      const load = () => fetch('/api/ai_log').then(r => r.json()).then(setD);
      useEffect(load, []);
      if (!d) return <p className="muted">Loading AI log…</p>;
      const money = (v) => v == null ? '—' : '$' + Number(v).toFixed(v < 1 ? 4 : 2);
      const provBadge = (p) => p === 'ollama'
        ? <span className="badge" style={{ background: '#dbeafe', color: '#1d4ed8' }}>🖥 ollama</span>
        : <span className="badge" style={{ background: '#dcfce7', color: '#166534' }}>☁️ openai</span>;
      return (
        <div>
          <h3 style={{ marginTop: 0 }}>AI usage log</h3>
          <div className="trend-grid" style={{ marginBottom: 12 }}>
            <div className="trend-cell">
              <h4>Total tokens</h4>
              <div className="trend-stat"><strong>{d.total_tokens.toLocaleString()}</strong></div>
              <div className="muted" style={{ fontSize: '0.78rem' }}>{d.total_calls} calls</div>
            </div>
            <div className="trend-cell">
              <h4>Total cost</h4>
              <div className="trend-stat"><strong>{money(d.total_cost_usd)}</strong></div>
              <div className="muted" style={{ fontSize: '0.78rem' }}>OpenAI only — Ollama is $0</div>
            </div>
            <div className="trend-cell">
              <h4>Est. / month</h4>
              <div className="trend-stat"><strong>{money(d.est_monthly_cost_usd)}</strong></div>
              <div className="muted" style={{ fontSize: '0.78rem' }}>extrapolated</div>
            </div>
          </div>

          {d.by_provider && Object.keys(d.by_provider).length > 0 && (
            <details style={{ marginBottom: 6 }}>
              <summary className="muted" style={{ cursor: 'pointer' }}>By provider</summary>
              <table className="log-table" style={{ marginTop: 6 }}>
                <thead><tr><th>Provider</th><th>Calls</th><th>Tokens</th><th>Cost</th></tr></thead>
                <tbody>
                  {Object.entries(d.by_provider).map(([p, b]) => (
                    <tr key={p}><td>{provBadge(p)}</td><td>{b.calls}</td><td>{b.tokens.toLocaleString()}</td><td>{money(b.cost_usd)}</td></tr>
                  ))}
                </tbody>
              </table>
            </details>
          )}

          {Object.keys(d.by_reason || {}).length > 0 && (
            <details style={{ marginBottom: 10 }}>
              <summary className="muted" style={{ cursor: 'pointer' }}>By reason</summary>
              <table className="log-table" style={{ marginTop: 6 }}>
                <thead><tr><th>Reason</th><th>Calls</th><th>Tokens</th><th>Cost</th></tr></thead>
                <tbody>
                  {Object.entries(d.by_reason).map(([r, b]) => (
                    <tr key={r}><td>{r}</td><td>{b.calls}</td><td>{b.tokens.toLocaleString()}</td><td>{money(b.cost_usd)}</td></tr>
                  ))}
                </tbody>
              </table>
            </details>
          )}

          <table className="log-table">
            <thead><tr>
              <th>Time</th><th>Provider</th><th>Model</th><th>Source data</th>
              <th>Tokens (in/out)</th><th>Time</th><th>Cost</th>
            </tr></thead>
            <tbody>
              {d.entries.length === 0 && <tr><td colSpan="7" className="muted">No AI calls logged yet.</td></tr>}
              {d.entries.map((e, i) => (
                <tr key={i}>
                  <td>{new Date(e.ts).toLocaleString()}</td>
                  <td>{provBadge(e.provider || 'openai')}</td>
                  <td><code>{e.model}</code></td>
                  <td style={{ maxWidth: 240, fontSize: '0.85rem' }}>{e.source_data || e.reason}</td>
                  <td>{e.prompt_tokens.toLocaleString()} / {e.completion_tokens.toLocaleString()}</td>
                  <td>{e.elapsed_sec != null ? e.elapsed_sec.toFixed(2) + 's' : '—'}</td>
                  <td>{money(e.cost_usd)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="row-flex" style={{ marginTop: 8 }}>
            <button onClick={load} style={{ background: '#64748b' }}>Refresh</button>
            <button style={{ background: '#dc2626' }} onClick={async () => {
              if (!confirm('Clear the AI usage log? Totals and monthly estimate restart from zero.')) return;
              await fetch('/api/ai_log/reset', { method: 'POST' });
              load();
            }}>Reset log</button>
          </div>
        </div>
      );
    }

    function CleanupBlock() {
      const [busy, setBusy] = useState(false);
      const [result, setResult] = useState(null);
      const run = async () => {
        if (!confirm('Permanently delete every reading older than 3 months from BOTH Cloudflare KV and the local SQLite database? This cannot be undone.')) return;
        setBusy(true);
        setResult(null);
        try {
          const r = await fetch('/api/cleanup/old', { method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ months: 3 }) });
          setResult(await r.json());
        } catch (e) {
          setResult({ error: String(e) });
        }
        setBusy(false);
      };
      return (
        <div>
          <h3 style={{ marginTop: 0 }}>Clean up old data</h3>
          <p className="muted">
            Delete every reading older than 3 months from both Cloudflare KV and local SQLite.
            Frees KV storage (keeps you well under the 1GB free-tier cap) and trims the dashboard's
            historical scope. Deletes are bulk (one HTTP call per buoy) but still count against
            the 1,000/day delete cap — typically well under that.
          </p>
          <button onClick={run} disabled={busy} style={{ background: '#dc2626' }}>
            {busy ? 'Cleaning…' : '🗑 Delete data older than 3 months'}
          </button>
          {result && !result.error && (
            <div style={{ marginTop: 12 }}>
              {Object.entries(result).map(([bid, r]) => (
                <div key={bid} className="trend-stat" style={{ marginBottom: 4 }}>
                  <strong>{r.name}</strong>: removed {r.kv_deleted} KV keys, {r.db_deleted} DB rows
                  {r.error && <span style={{ color: '#dc2626' }}> — error: {r.error}</span>}
                  <span className="muted" style={{ marginLeft: 8, fontSize: '0.78rem' }}>(cutoff {r.cutoff})</span>
                </div>
              ))}
            </div>
          )}
          {result && result.error && <p style={{ color: '#dc2626' }}>{result.error}</p>}
        </div>
      );
    }

    function UsageBlock() {
      const [u, setU] = useState(null);
      const load = () => fetch('/api/usage').then(r => r.json()).then(setU);
      useEffect(load, []);

      // Stacked bar: solid segment = actual usage so far, lighter segment =
      // projected additional usage by end-of-window. Red overlay if the
      // projection exceeds the limit.
      const bar = (used, projected, limit, color) => {
        const usedPct = Math.min(100, (used / Math.max(1, limit)) * 100);
        const projPct = Math.min(100, (projected / Math.max(1, limit)) * 100);
        const overshoot = projected > limit;
        return (
          <div style={{ background: '#e2e8f0', borderRadius: 4, height: 12, overflow: 'hidden',
                          marginTop: 4, position: 'relative' }}>
            {/* projected (lighter) layer underneath */}
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${projPct}%`,
                            background: overshoot ? '#fca5a5' : color, opacity: 0.45 }} />
            {/* actual (solid) layer on top */}
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${usedPct}%`,
                            background: overshoot ? '#dc2626' : color }} />
          </div>
        );
      };

      const block = (label, k) => (
        <div style={{ marginBottom: 14 }}>
          <div className="trend-stat">
            <strong>{label}</strong>: {k.today_used.toLocaleString()} so far •
            projected <strong>{k.today_projected.toLocaleString()}</strong> /
            {k.today_limit.toLocaleString()} today
            {k.today_will_exceed && <span className="badge badge-red" style={{ marginLeft: 6 }}>WILL EXCEED</span>}
          </div>
          {bar(k.today_used, k.today_projected, k.today_limit, '#3b82f6')}
          <div className="trend-stat muted" style={{ marginTop: 4, fontSize: '0.78rem' }}>
            Month: {k.month_used.toLocaleString()} → projected {k.month_projected.toLocaleString()} /
            {k.month_limit.toLocaleString()}
            {k.month_will_exceed && <span className="badge badge-red" style={{ marginLeft: 6 }}>WILL EXCEED</span>}
          </div>
          {bar(k.month_used, k.month_projected, k.month_limit, '#8b5cf6')}
        </div>
      );

      if (!u) return <p className="muted">Loading usage…</p>;
      return (
        <div>
          <h3 style={{ marginTop: 0 }}>API rate limits (Cloudflare KV free tier)</h3>
          <p className="muted" style={{ marginBottom: 12 }}>
            Today {u.today_date} ({u.hours_into_day}h in) — Month {u.month} (day {u.days_into_month.toFixed(1)} of {u.days_in_month}).
            <br />
            <span style={{ display: 'inline-block', width: 10, height: 10, background: '#3b82f6', borderRadius: 2, marginRight: 4 }} />
            actual so far &nbsp;
            <span style={{ display: 'inline-block', width: 10, height: 10, background: '#3b82f6', opacity: 0.45, borderRadius: 2, marginRight: 4 }} />
            projected by end of window
          </p>
          {block('Reads',  u.reads)}
          {block('Writes', u.writes)}
          {block('Lists',  u.lists)}
          <p className="muted" style={{ marginTop: 12, fontSize: '0.78rem' }}>
            <strong>Free-tier daily limits</strong>: {u.limits_daily.reads_per_day.toLocaleString()} reads,
            {' '}{u.limits_daily.writes_per_day.toLocaleString()} writes, {u.limits_daily.lists_per_day.toLocaleString()} lists.
            Monthly comparison uses daily×{u.days_in_month} as implied ceiling (CF doesn't publish a separate monthly cap).
          </p>
          <p className="muted" style={{ fontSize: '0.78rem' }}>{u.note}</p>
          <button onClick={load} style={{ background: '#64748b', marginTop: 4 }}>Refresh</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
